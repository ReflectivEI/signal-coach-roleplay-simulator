<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background circle -->
  <circle cx="90" cy="90" r="88" fill="#1a1a2e" stroke="#14f195" stroke-width="2"/>
  
  <!-- Brain/AI icon - stylized neural network -->
  <g transform="translate(90, 90)">
    <!-- Center circle (nucleus) -->
    <circle cx="0" cy="0" r="12" fill="#14f195"/>
    
    <!-- Surrounding nodes -->
    <circle cx="35" cy="0" r="8" fill="#14f195" opacity="0.8"/>
    <circle cx="-35" cy="0" r="8" fill="#14f195" opacity="0.8"/>
    <circle cx="0" cy="35" r="8" fill="#14f195" opacity="0.8"/>
    <circle cx="0" cy="-35" r="8" fill="#14f195" opacity="0.8"/>
    
    <circle cx="25" cy="25" r="6" fill="#14f195" opacity="0.6"/>
    <circle cx="-25" cy="25" r="6" fill="#14f195" opacity="0.6"/>
    <circle cx="25" cy="-25" r="6" fill="#14f195" opacity="0.6"/>
    <circle cx="-25" cy="-25" r="6" fill="#14f195" opacity="0.6"/>
    
    <!-- Connection lines between nodes -->
    <line x1="0" y1="0" x2="35" y2="0" stroke="#14f195" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="0" x2="-35" y2="0" stroke="#14f195" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="35" stroke="#14f195" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#14f195" stroke-width="1.5" opacity="0.7"/>
    
    <line x1="0" y1="0" x2="25" y2="25" stroke="#14f195" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-25" y2="25" stroke="#14f195" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="25" y2="-25" stroke="#14f195" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-25" y2="-25" stroke="#14f195" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
