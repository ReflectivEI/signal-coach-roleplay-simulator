name = "reflect-ai-now"
main = "src/worker.js"
compatibility_date = "2024-02-27"

# Do NOT rely on local login in CI
# Account ID should match GitHub secret
account_id = "59fea97fab54fbd4d4168ccaa1fa3410"

workers_dev = true

# Route ALL requests to this worker
routes = [
  { pattern = "reflectiv-ai.com/*", zone_name = "reflectiv-ai.com" }
]

[vars]
DEBUG = "false"
LLM_TIMEOUT_MS = "25000"

# Upload static files - this creates the __STATIC_CONTENT binding
[site]
bucket = "dist/client"
