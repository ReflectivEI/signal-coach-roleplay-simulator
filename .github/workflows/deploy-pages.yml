name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to Cloudflare Pages
    env:
      CF_PAGES_PROJECT: reflectiv-ai
      CF_ACCOUNT_ID: 59fea97fab54fbd4d4168ccaa1fa3410
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi

          if ! echo "$CF_ACCOUNT_ID" | grep -Eq '^[a-f0-9]{32}$'; then
            echo "::error::Workflow CF_ACCOUNT_ID must be a 32-character lowercase hex string"
            exit 1
          fi

          echo "Cloudflare API token is present and account ID format is valid."

      - name: Validate Pages project access
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          RESPONSE=$(curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PAGES_PROJECT}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")

          echo "$RESPONSE" | node -e "const fs=require('fs');const body=JSON.parse(fs.readFileSync(0,'utf8'));if(body.success!==true){const errs=(body.errors||[]).map(e=>e.message).join('; ')||'Unknown Cloudflare API error';console.error('::error::Cloudflare Pages project validation failed: '+errs);process.exit(1)};console.log('Cloudflare Pages project access verified: '+(body.result?.name||process.env.CF_PAGES_PROJECT));"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          command: pages deploy dist/client --project-name=${{ env.CF_PAGES_PROJECT }} --branch=main

      - name: Create GitHub Deployment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: 'Deployment to Cloudflare Pages'
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: 'https://reflectiv-ai.com',
              description: 'Deployment to Cloudflare Pages completed successfully'
            });


