name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-pages-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build application

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run ci:build

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    needs: build

    env:
      CF_ACCOUNT_ID: 59fea97fab54fbd4d4168ccaa1fa3410
      CLOUDFLARE_PAGES_PROJECT: reflect-ai-now
      CLOUDFLARE_PAGES_OUTPUT_DIR: dist/client

    steps:
      - name: Check deploy secret availability
        id: cf_token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::error::CLOUDFLARE_API_TOKEN is missing"
            exit 1
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run ci:build

      - name: Deploy to Cloudflare Pages
        id: deploy_pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          command: pages deploy ${{ env.CLOUDFLARE_PAGES_OUTPUT_DIR }} --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }}

      - name: Create GitHub Deployment
        if: steps.deploy_pages.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: 'Deployment to Cloudflare Pages'
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: 'https://reflectiv-ai.com',
              description: 'Deployment successful'
            });
