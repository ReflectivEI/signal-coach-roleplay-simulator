name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to Cloudflare Pages
    env:
      CF_PAGES_PROJECT: reflectiv-ai
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

          if ! echo "$CLOUDFLARE_ACCOUNT_ID" | grep -Eq '^[a-f0-9]{32}$'; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID must be a 32-character lowercase hex string"
            exit 1
          fi

          echo "Cloudflare credentials are present and account ID format is valid."

      - name: Validate Pages project access
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project list --json > /tmp/cf-pages-projects.json
          node -e "const fs=require('fs'); const projects=JSON.parse(fs.readFileSync('/tmp/cf-pages-projects.json','utf8')); const target=process.env.CF_PAGES_PROJECT; if(!Array.isArray(projects)||!projects.some(p=>p&&p.name===target)){console.error('::error::Cloudflare Pages project not found or token lacks access: '+target); process.exit(1);} console.log('Cloudflare Pages project access verified: '+target);"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/client --project-name=${{ env.CF_PAGES_PROJECT }} --branch=main

      - name: Create GitHub Deployment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: 'Deployment to Cloudflare Pages'
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: 'https://reflectiv-ai.com',
              description: 'Deployment to Cloudflare Pages completed successfully'
            });

      - name: Deployment Failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('Cloudflare Pages deployment failed. Check the logs above for details. Common issues: 1) Missing secrets (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID), 2) Incorrect project name, 3) Build errors.')

