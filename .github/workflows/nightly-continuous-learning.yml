name: Nightly Continuous Learning Evaluation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  nightly-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run nightly continuous-learning evaluation
        env:
          VITE_ROLEPLAY_WORKER_URL: ${{ secrets.VITE_ROLEPLAY_WORKER_URL }}
        run: npm run test:continuous-learning-eval

      - name: Upload continuous-learning artifact
        uses: actions/upload-artifact@v4
        with:
          name: continuous-learning-latest
          path: |
            artifacts/continuous-learning/latest.json
            artifacts/continuous-learning/trend.ndjson
          if-no-files-found: warn
