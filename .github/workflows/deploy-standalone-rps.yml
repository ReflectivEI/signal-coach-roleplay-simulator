name: Deploy Standalone RPS Worker and Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-standalone-rps-production
  cancel-in-progress: false

env:
  CF_ACCOUNT_ID: 59fea97fab54fbd4d4168ccaa1fa3410
  RPS_WORKER_NAME: signal-coach-roleplay-simulator
  RPS_PAGES_PROJECT: signal-coach-roleplay-simulator
  RPS_WORKER_URL: https://signal-coach-roleplay-simulator.tonyabdelmalak.workers.dev
  RPS_PAGES_URL: https://signal-coach-roleplay-simulator.pages.dev
  RPS_CUSTOM_DOMAIN: https://rps.reflectiv-ai.com
  EXPECTED_REPOSITORY: ReflectivEI/signal-coach-roleplay-simulator

jobs:
  validate-boundary:
    runs-on: ubuntu-latest
    name: Validate standalone RPS deployment boundary

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Assert repository and Cloudflare targets
        run: node scripts/assert-rps-deploy-targets.mjs

      - name: Build standalone RPS bundle
        env:
          VITE_ROLEPLAY_WORKER_URL: ${{ env.RPS_WORKER_URL }}
        run: npm run ci:build

      - name: Run lint
        run: npm run lint

  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy dedicated RPS Worker
    needs: validate-boundary

    steps:
      - name: Check deploy secret availability
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is missing"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Re-assert standalone RPS targets
        run: node scripts/assert-rps-deploy-targets.mjs

      - name: Deploy signal-coach-roleplay-simulator Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          command: deploy --config wrangler.toml

      - name: Sync model provider secrets to signal-coach-roleplay-simulator Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_SB_2: ${{ secrets.GROQ_API_KEY_SB_2 }}
          GROQ_API_KEY_SB_3: ${{ secrets.GROQ_API_KEY_SB_3 }}
          GROQ_API_KEY_SB_4: ${{ secrets.GROQ_API_KEY_SB_4 }}
          GROQ_API_KEY_SB_5: ${{ secrets.GROQ_API_KEY_SB_5 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set +x
          synced=0

          put_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx wrangler secret put "$name" --config wrangler.toml
              synced=$((synced + 1))
            fi
          }

          put_secret GROQ_API_KEY "$GROQ_API_KEY"
          put_secret GROQ_API_KEY_SB_2 "$GROQ_API_KEY_SB_2"
          put_secret GROQ_API_KEY_SB_3 "$GROQ_API_KEY_SB_3"
          put_secret GROQ_API_KEY_SB_4 "$GROQ_API_KEY_SB_4"
          put_secret GROQ_API_KEY_SB_5 "$GROQ_API_KEY_SB_5"
          put_secret OPENAI_API_KEY "$OPENAI_API_KEY"

          if [ "$synced" -eq 0 ]; then
            echo "::error::No model provider GitHub secrets are configured for the corrected Worker target. Add GROQ_API_KEY or OPENAI_API_KEY to this repository's GitHub Actions secrets."
            exit 1
          fi

          echo "Synced $synced model provider secret(s) to $RPS_WORKER_NAME."

      - name: Verify model provider secrets on signal-coach-roleplay-simulator Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
        run: |
          npx wrangler secret list --config wrangler.toml | tee worker-secrets.json
          grep -Eq '"name"[[:space:]]*:[[:space:]]*"(GROQ_API_KEY|OPENAI_API_KEY)"' worker-secrets.json

  deploy-pages:
    runs-on: ubuntu-latest
    name: Deploy dedicated RPS Pages project
    needs:
      - validate-boundary
      - deploy-worker

    steps:
      - name: Check deploy secret availability
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is missing"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Re-assert standalone RPS targets
        run: node scripts/assert-rps-deploy-targets.mjs

      - name: Build standalone RPS bundle
        env:
          VITE_ROLEPLAY_WORKER_URL: ${{ env.RPS_WORKER_URL }}
        run: npm run ci:build

      - name: Deploy signal-coach-roleplay-simulator Pages
        id: deploy_pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          command: pages deploy dist/client --project-name=${{ env.RPS_PAGES_PROJECT }} --branch=main

      - name: Verify live dedicated Worker
        run: |
          curl --fail --silent --show-error "$RPS_WORKER_URL/health" | tee worker-health.json
          grep -q '"service":"signal-coach-roleplay-simulator"' worker-health.json
          grep -q '"ready":true' worker-health.json

      - name: Verify live dedicated Worker LLM invoke
        run: |
          curl --fail --silent --show-error --request POST "$RPS_WORKER_URL/api/llm/invoke" \
            --header "Content-Type: application/json" \
            --data '{"prompt":"Return the single word ok.","max_tokens":8,"temperature":0}' \
            | tee worker-llm-smoke.json
          grep -q '"provider":"groq"' worker-llm-smoke.json
          grep -q '"response"' worker-llm-smoke.json

      - name: Verify live dedicated Pages shell
        run: |
          curl --fail --silent --show-error "$RPS_PAGES_URL" | tee pages.html
          grep -q "Signal Coach Role Play Simulator" pages.html
          grep -q "/assets/index-" pages.html

      - name: Create GitHub Deployment
        if: steps.deploy_pages.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'standalone-rps-production',
              auto_merge: false,
              required_contexts: [],
              description: 'Deployment to dedicated standalone RPS Worker and Pages'
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: process.env.RPS_CUSTOM_DOMAIN,
              description: 'Standalone RPS Worker and Pages deployment successful'
            });
